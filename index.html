<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPTV Playlist Generator</title>
    <meta name="theme-color" content="#0a84ff" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      try {
        const theme = localStorage.getItem('iptv-theme') || 'dark';
        const lang = localStorage.getItem('iptv-lang') || 'sk';
        document.documentElement.dataset.theme = theme;
        document.documentElement.lang = lang;
      } catch {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <noscript>Táto aplikácia vyžaduje JavaScript.</noscript>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
